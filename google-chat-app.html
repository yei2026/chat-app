<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Chat 送信アプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #e0f5f1 0%, #b2ece0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,150,120,0.15);
      text-align: center;
    }

    .logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 16px;
    }

    h1 {
      font-size: 20px;
      color: #00695c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #80cbc4;
      margin-bottom: 32px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      text-decoration: none;
      margin-bottom: 14px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, #00bfa5, #00897b);
      color: white;
      box-shadow: 0 4px 14px rgba(0,150,120,0.35);
    }

    .btn-primary:hover {
      opacity: 0.92;
    }

    .btn-secondary {
      background: #e0f5f1;
      color: #00796b;
    }

    .btn-secondary:hover {
      background: #b2dfdb;
    }

    .status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.success {
      background: #e0f5f1;
      color: #00695c;
      display: block;
    }

    .status.error {
      background: #fce8e6;
      color: #c5221f;
      display: block;
    }

    .status.sending {
      background: #e0f5f1;
      color: #00897b;
      display: block;
    }

    /* ── 設定モーダル ── */
    .setup-hint {
      font-size: 12px;
      color: #b2dfdb;
      margin-top: 24px;
      cursor: pointer;
      text-decoration: underline;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 420px;
      width: 100%;
    }

    .modal h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .modal label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }

    .modal input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-save {
      background: linear-gradient(135deg, #00bfa5, #00897b);
      color: white;
    }

    .btn-cancel {
      background: #f1f3f4;
      color: #555;
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Google Chat アイコン風 -->
  <svg class="logo" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="70" height="70" rx="20" fill="url(#grad)"/>
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="70" y2="70" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#00bfa5"/>
        <stop offset="100%" stop-color="#00796b"/>
      </linearGradient>
    </defs>
    <!-- チャットバブル -->
    <path d="M14 22h42v22a5 5 0 0 1-5 5H22l-8 7v-7h0a0 0 0 0 1 0 0V22z" fill="white" opacity="0.95"/>
    <circle cx="26" cy="33" r="3" fill="#00897b"/>
    <circle cx="35" cy="33" r="3" fill="#00897b"/>
    <circle cx="44" cy="33" r="3" fill="#00897b"/>
  </svg>

  <h1>Google Chat 送信</h1>
  <p class="subtitle">ボタンを押してメッセージを送信</p>

  <button class="btn btn-primary" onclick="sendMessage()">
    🚀 起動しました
  </button>

  <a id="chatLink" class="btn btn-secondary" href="#" target="_blank" onclick="openChat(event)">
    💬 チャット画面へ
  </a>

  <div id="status" class="status"></div>

  <p class="setup-hint" onclick="openSetup()">⚙️ 設定（管理者用）</p>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2>⚙️ 設定</h2>
    <label>Google Chat Webhook URL</label>
    <input type="url" id="webhookInput" placeholder="https://chat.googleapis.com/v1/spaces/..." />
    <label>Google Chat スペース URL（「チャット画面へ」ボタン用）</label>
    <input type="url" id="chatUrlInput" placeholder="https://chat.google.com/room/..." />
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeSetup()">キャンセル</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
  // ── 設定の読み込み ──
  const WEBHOOK_KEY = 'gchat_webhook_url';
  const CHATURL_KEY = 'gchat_chat_url';

  const DEFAULT_WEBHOOK = 'https://chat.googleapis.com/v1/spaces/AAAAQEeC0dg/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=sdl0s29urgb4VRN2VrfymUtcVOR2Ab_5xBxK98QoCV8';
  const DEFAULT_CHAT_URL = 'https://chat.google.com/room/AAAAQEeC0dg?cls=7';

  function getWebhookUrl() {
    return localStorage.getItem(WEBHOOK_KEY) || DEFAULT_WEBHOOK;
  }

  function getChatUrl() {
    return localStorage.getItem(CHATURL_KEY) || DEFAULT_CHAT_URL;
  }

  // ── 起動しましたボタン ──
  async function sendMessage() {
    const webhookUrl = getWebhookUrl();
    if (!webhookUrl) {
      showStatus('error', '❗ まず設定からWebhook URLを入力してください');
      return;
    }

    showStatus('sending', '📤 送信中...');

    try {
      const response = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: '起動しました' })
      });

      if (response.ok) {
        showStatus('success', '✅ 送信しました！チャット画面を開きます...');
        setTimeout(() => { window.open(getChatUrl(), '_blank'); }, 800);
      } else {
        showStatus('error', `❌ 送信失敗（エラー: ${response.status}）`);
      }
    } catch (e) {
      showStatus('error', '❌ 送信できませんでした。URLを確認してください。');
    }
  }

  // ── チャット画面へボタン ──
  function openChat(e) {
    e.preventDefault();
    const url = getChatUrl();
    window.open(url, '_blank');
  }

  // ── ステータス表示 ──
  function showStatus(type, message) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = message;
    if (type === 'success') {
      setTimeout(() => { el.className = 'status'; el.textContent = ''; }, 3000);
    }
  }

  // ── 設定モーダル ──
  function openSetup() {
    document.getElementById('webhookInput').value = getWebhookUrl();
    document.getElementById('chatUrlInput').value = getChatUrl();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeSetup() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

    if (e.target === document.getElem
