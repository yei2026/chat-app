<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Chat 送信アプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 16px;
    }

    h1 {
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      text-decoration: none;
      margin-bottom: 14px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #1a73e8;
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: #e8f0fe;
      color: #1a73e8;
    }

    .btn-secondary:hover {
      background: #d2e3fc;
    }

    .status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.success {
      background: #e6f4ea;
      color: #137333;
      display: block;
    }

    .status.error {
      background: #fce8e6;
      color: #c5221f;
      display: block;
    }

    .status.sending {
      background: #e8f0fe;
      color: #1a73e8;
      display: block;
    }

    /* ── 設定モーダル ── */
    .setup-hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 24px;
      cursor: pointer;
      text-decoration: underline;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 420px;
      width: 100%;
    }

    .modal h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .modal label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }

    .modal input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-save {
      background: #1a73e8;
      color: white;
    }

    .btn-cancel {
      background: #f1f3f4;
      color: #555;
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Google Chat アイコン風 -->
  <svg class="logo" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="60" height="60" rx="16" fill="#1a73e8"/>
    <path d="M15 20h30v16a4 4 0 0 1-4 4H19l-6 5v-5h-2a0 0 0 0 1 0 0V20z" fill="white" opacity="0.9"/>
    <circle cx="22" cy="28" r="2.5" fill="#1a73e8"/>
    <circle cx="30" cy="28" r="2.5" fill="#1a73e8"/>
    <circle cx="38" cy="28" r="2.5" fill="#1a73e8"/>
  </svg>

  <h1>Google Chat 送信</h1>
  <p class="subtitle">ボタンを押してメッセージを送信</p>

  <button class="btn btn-primary" onclick="sendMessage()">
    🚀 起動しました
  </button>

  <a id="chatLink" class="btn btn-secondary" href="#" target="_blank" onclick="openChat(event)">
    💬 チャット画面へ
  </a>

  <div id="status" class="status"></div>

  <p class="setup-hint" onclick="openSetup()">⚙️ 設定（管理者用）</p>
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2>⚙️ 設定</h2>
    <label>Google Chat Webhook URL</label>
    <input type="url" id="webhookInput" placeholder="https://chat.googleapis.com/v1/spaces/..." />
    <label>Google Chat スペース URL（「チャット画面へ」ボタン用）</label>
    <input type="url" id="chatUrlInput" placeholder="https://chat.google.com/room/..." />
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeSetup()">キャンセル</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
  // ── 設定の読み込み ──
  const WEBHOOK_KEY = 'gchat_webhook_url';
  const CHATURL_KEY = 'gchat_chat_url';

  function getWebhookUrl() {
    return localStorage.getItem(WEBHOOK_KEY) || '';
  }

  function getChatUrl() {
    return localStorage.getItem(CHATURL_KEY) || 'https://chat.google.com';
  }

  // ── 起動しましたボタン ──
  async function sendMessage() {
    const webhookUrl = getWebhookUrl();
    if (!webhookUrl) {
      showStatus('error', '❗ まず設定からWebhook URLを入力してください');
      return;
    }

    showStatus('sending', '📤 送信中...');

    try {
      const response = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: '起動しました' })
      });

      if (response.ok) {
        showStatus('success', '✅ 送信しました！チャット画面を開きます...');
        setTimeout(() => { window.open(getChatUrl(), '_blank'); }, 800);
      } else {
        showStatus('error', `❌ 送信失敗（エラー: ${response.status}）`);
      }
    } catch (e) {
      showStatus('error', '❌ 送信できませんでした。URLを確認してください。');
    }
  }

  // ── チャット画面へボタン ──
  function openChat(e) {
    e.preventDefault();
    const url = getChatUrl();
    window.open(url, '_blank');
  }

  // ── ステータス表示 ──
  function showStatus(type, message) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = message;
    if (type === 'success') {
      setTimeout(() => { el.className = 'status'; el.textContent = ''; }, 3000);
    }
  }

  // ── 設定モーダル ──
  function openSetup() {
    document.getElementById('webhookInput').value = getWebhookUrl();
    document.getElementById('chatUrlInput').value = getChatUrl();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeSetup() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function closeOnOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) closeSetup();
  }

  function saveSettings() {
    const webhook = document.getElementById('webhookInput').value.trim();
    const chatUrl = document.getElementById('chatUrlInput').value.trim();
    if (webhook) localStorage.setItem(WEBHOOK_KEY, webhook);
    if (chatUrl) localStorage.setItem(CHATURL_KEY, chatUrl);
    closeSetup();
    showStatus('success', '✅ 設定を保存しました');
  }
</script>
</body>
</html>
